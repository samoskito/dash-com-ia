providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = [
  "corepack enable",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @wpptrack/shared build",
  "pnpm --filter @wpptrack/api build",
  "pnpm --dir apps/api exec prisma generate --schema prisma/schema.prisma"
]

[start]
cmd = "pnpm --dir apps/api exec prisma migrate deploy --schema prisma/schema.prisma && pnpm --filter @wpptrack/api start"
