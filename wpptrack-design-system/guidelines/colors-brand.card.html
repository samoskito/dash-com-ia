<!-- @dsCard group="Colors" viewport="700x150" name="Brand — teal / petroleum" subtitle="Primary scale · --teal-500 is PRIMARY" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-surface);font-family:var(--font-mono);padding:20px}
  .row{display:flex;gap:6px}
  .sw{flex:1;border-radius:8px;height:74px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff}
  .sw small{font-size:10px;opacity:.95;line-height:1.3}
  .sw .hex{font-size:10px;opacity:.8}
  .dark small,.dark .hex{color:#0B1211!important}
  .star{position:absolute;margin-top:-2px;font-family:var(--font-body);font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--teal-50)"><small style="color:#0A5E53">50</small></div>
    <div class="sw" style="background:var(--teal-100)"><small style="color:#0A5E53">100</small></div>
    <div class="sw" style="background:var(--teal-200)"><small style="color:#0A5E53">200</small></div>
    <div class="sw" style="background:var(--teal-300)"><small style="color:#06231F">300</small></div>
    <div class="sw" style="background:var(--teal-400)"><small>400</small></div>
    <div class="sw" style="background:var(--teal-500)"><span class="star">★ primary</span><small>500</small><span class="hex">#0E8C7A</span></div>
    <div class="sw" style="background:var(--teal-600)"><small>600</small></div>
    <div class="sw" style="background:var(--teal-700)"><small>700</small></div>
    <div class="sw" style="background:var(--teal-800)"><small>800</small></div>
    <div class="sw" style="background:var(--teal-900)"><small>900</small></div>
  </div>
</body></html>
