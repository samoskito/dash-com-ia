<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces — light & dark" subtitle="Semantic surface/text/border tokens in both themes" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);display:flex}
  .pane{flex:1;padding:20px;background:var(--bg-app)}
  .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-brand);margin:0 0 12px}
  .card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--shadow-sm)}
  .h{font-family:var(--font-display);font-weight:600;color:var(--text-primary);font-size:15px;margin:0 0 4px}
  .p{color:var(--text-secondary);font-size:12px;margin:0 0 10px}
  .chips{display:flex;gap:6px}
  .chip{font-family:var(--font-mono);font-size:10px;padding:3px 8px;border-radius:999px;background:var(--brand-subtle);color:var(--text-brand)}
  .chip.alt{background:var(--bg-subtle);color:var(--text-muted)}
</style></head><body>
  <div class="pane" data-theme="light">
    <p class="eyebrow">Light · default</p>
    <div class="card"><p class="h">surface / card</p><p class="p">text-secondary on surface</p>
      <div class="chips"><span class="chip">brand-subtle</span><span class="chip alt">bg-subtle</span></div></div>
  </div>
  <div class="pane" data-theme="dark">
    <p class="eyebrow">Dark · console</p>
    <div class="card"><p class="h">surface / card</p><p class="p">text-secondary on surface</p>
      <div class="chips"><span class="chip">brand-subtle</span><span class="chip alt">bg-subtle</span></div></div>
  </div>
</body></html>
