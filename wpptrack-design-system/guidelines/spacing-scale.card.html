<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-surface);font-family:var(--font-mono);padding:22px;color:var(--text-secondary)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--brand);border-radius:3px;width:22px}
  .n{font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="n">1·4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="n">2·8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="n">3·12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="n">4·16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="n">6·24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="n">8·32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="n">12·48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="n">16·64</span></div>
    <div class="item"><div class="bar" style="height:80px"></div><span class="n">20·80</span></div>
  </div>
</body></html>
