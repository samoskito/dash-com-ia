<!-- @dsCard group="Type" viewport="700x200" name="Mono & metrics — JetBrains Mono" subtitle="Data, IDs, UTMs, eyebrows, big numbers" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-surface);font-family:var(--font-body);padding:24px;color:var(--text-primary)}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-brand);margin:0}
  .metric{font-family:var(--font-display);font-weight:600;font-size:42px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;margin:2px 0 0}
  .delta{font-family:var(--font-mono);font-size:13px;color:var(--success);margin-left:8px;font-weight:600}
  .codes{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
  .code{font-family:var(--font-mono);font-size:12px;background:var(--bg-subtle);color:var(--text-secondary);padding:5px 9px;border-radius:6px;border:1px solid var(--border)}
  .code b{color:var(--text-brand)}
</style></head><body>
  <p class="eyebrow">Leads no WhatsApp · 7 dias</p>
  <p class="metric">1.284<span class="delta">+18%</span></p>
  <div class="codes">
    <span class="code"><b>utm_campaign</b>=black-friday</span>
    <span class="code"><b>adset</b>=lookalike-2%</span>
    <span class="code"><b>ad_id</b>=23859·441</span>
  </div>
</body></html>
